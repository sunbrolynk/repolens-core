name: CI

# Runs on every PR into main and on pushes to feature branches.
# Security checks BLOCK merge; lint/coverage start INFORMATIONAL (continue-on-error)
# until upstream debt is cleaned, then get promoted to blocking by removing
# continue-on-error and adding them as required status checks in branch protection.

"on":
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]   # main is protected; it only receives squash-merges

# Least privilege by default: jobs get read-only unless they declare more.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # SECRET SCANNING — BLOCKING
  # ============================================================
  secrets:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (no persisted credentials)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc

  # ============================================================
  # API (NestJS) — type-check + lint + test + audit
  # ============================================================
  api:
    name: api (typecheck / lint / test / audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      # npm ci = install EXACTLY the locked tree (verifies integrity hashes),
      # fails if package.json and lockfile disagree. --ignore-scripts blocks
      # install-time code execution (primary supply-chain payload vector).
      - name: Install (locked, no scripts)
        run: npm ci --ignore-scripts --legacy-peer-deps

      # Prisma client generation is a legitimate, explicitly-allowed postinstall step.
      - name: Generate Prisma client
        run: npx prisma generate

      # BLOCKING: dependency vulnerability audit (prod deps).
      - name: npm audit (prod)
        run: npm audit --omit=dev --audit-level=high

      # BLOCKING: must compile.
      - name: Type-check
        run: npx tsc --noEmit

      # INFORMATIONAL until upstream lint debt is cleaned, then promote to blocking.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      # INFORMATIONAL until a real test suite + coverage gates exist.
      - name: Test
        run: npm test
        continue-on-error: true

  # ============================================================
  # FRONTEND (Next.js) — lint + build + audit
  # ============================================================
  frontend:
    name: frontend (lint / build / audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install (locked, no scripts)
        run: npm ci --ignore-scripts --legacy-peer-deps

      # BLOCKING: dependency vulnerability audit.
      - name: npm audit (prod)
        run: npm audit --omit=dev --audit-level=high

      # INFORMATIONAL until upstream lint debt is cleaned.
      - name: Lint
        run: npm run eslint:check
        continue-on-error: true

      # Build verifies the app actually compiles (Next build). INFORMATIONAL first
      # run in case env-dependent build steps need config; promote once green.
      - name: Build
        run: npm run build
        continue-on-error: true
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  # ============================================================
  # SAST — semgrep (BLOCKING on its default security rulesets)
  # ============================================================
  sast:
    name: semgrep (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: semgrep/semgrep@sha256:f4791a54c891eabe1188248135574e6e03dfc31dfd3f3b747c7bec7079bfed1b
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: semgrep scan
        run: semgrep scan --config=auto --error --skip-unknown-extensions
